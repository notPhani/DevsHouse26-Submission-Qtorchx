<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QtorchX - QNaF Synthetic Topography</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background-color: #050508; /* Deepening the black for the gradient pop */
        }

        #field-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0; 
            pointer-events: none;
        }

        .scroll-space {
            position: relative;
            z-index: 1;
            height: 500vh; 
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="field-canvas"></canvas>
    <div class="scroll-space"></div>

    <script>
        const canvas = document.getElementById('field-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let currentScroll = 0;
        let targetScroll = 0;

        window.addEventListener('scroll', () => {
            targetScroll = window.scrollY;
        });

        const numLines = 45;
        const arrowSeeds = Array.from({ length: numLines }, () => ({
            speed: 0.05 + Math.random() *3, // Randomized velocity
            offset: Math.random() *7,          // Randomized start position
            frequency: 2 + Math.random() * 4 // Randomized "wobble"
        }));
        function render() {
            ctx.clearRect(0, 0, width, height);

            currentScroll += (targetScroll - currentScroll) * 0.05;
            const time = currentScroll * 0.0015;

            ctx.lineCap = 'round';

            // Define the Quantum Gradient: Blue -> White -> Purple
            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            gradient.addColorStop(0, '#3498db');   // Quantum Blue
            gradient.addColorStop(0.5, '#ffffff'); // Peak Intensity (White)
            gradient.addColorStop(1, '#9b59b6');   // High-energy Purple

            const getPt = (p0, p1, p2, p3, t) => {
                const invT = 1 - t;
                return Math.pow(invT, 3) * p0 + 
                       3 * Math.pow(invT, 2) * t * p1 + 
                       3 * invT * Math.pow(t, 2) * p2 + 
                       Math.pow(t, 3) * p3;
            };

            for (let i = 0; i < numLines; i++) {
                const yOffset = (i * (height * 1.5 / numLines)) - (height * 0.25);
                const startX = -100, startY = yOffset;
                
                const cp1x = width * 0.35 + Math.sin(time * 0.8 + i * 0.15) * (width * 0.2);
                const cp1y = yOffset + Math.cos(time * 0.6 + i * 0.08) * 350;
                
                const cp2x = width * 0.65 + Math.cos(time * 0.9 - i * 0.12) * (width * 0.2);
                const cp2y = yOffset + Math.sin(time * 0.7 - i * 0.1) * 350;

                const endX = width + 100;
                const endY = yOffset + Math.sin(time * 0.5 + i * 0.05) * 150;

                // --- LINE DRAWING ---
                const dynamicWeight = 0.5 + Math.abs(Math.sin(time + i * 0.2)) * 1.2;
                const dynamicAlpha = 0.1 + Math.abs(Math.cos(time + i * 0.1)) * 0.25;
                
                ctx.beginPath();
                ctx.lineWidth = dynamicWeight;
                ctx.globalAlpha = dynamicAlpha; // Applying alpha globally to the gradient stroke
                ctx.strokeStyle = gradient;
                
                ctx.moveTo(startX, startY);
                ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, endX, endY);
                ctx.stroke();
                ctx.globalAlpha = 1.0; // Reset for triangles

                // --- TRIANGLE HEADS ---
                if (i%3 === 0) {
                    const t = (time * 0.15 + (i * 0.07)) % 1; 
                    const ax = getPt(startX, cp1x, cp2x, endX, t);
                    const ay = getPt(startY, cp1y, cp2y, endY, t);
                    
                    const aheadT = Math.min(t + 0.005, 1);
                    const tx = getPt(startX, cp1x, cp2x, endX, aheadT);
                    const ty = getPt(startY, cp1y, cp2y, endY, aheadT);
                    const angle = Math.atan2(ty - ay, tx - ax);

                    ctx.save();
                    ctx.translate(ax, ay);
                    ctx.rotate(angle);
                    
                    ctx.beginPath();
                    ctx.moveTo(4, 0);
                    ctx.lineTo(-6, -3.5);
                    ctx.lineTo(-6, 3.5);
                    ctx.closePath();
                    
                    // Triangles use a fixed high-contrast white with slight transparency
                    ctx.fillStyle = `rgba(255, 255, 255, ${dynamicAlpha + 0.4})`;
                    ctx.fill();
                    ctx.restore();
                }
            }
            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
